version: '3.8'

services:
  svelte-app: &svelte-base
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '5173:5173'
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
      # Force Vite to use polling if standard HMR file watching fails
      - CHOKIDAR_USEPOLLING=true

  svelte-preview:
    <<: *svelte-base
    command: sh -c "pnpm build && pnpm preview"
    ports:
      - '4173:4173'
    environment:
      - NODE_ENV=production
      - CI=true
