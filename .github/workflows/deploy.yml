name: Deploy to GitHub Pages
permissions:
  contents: read

on:
  push:
    branches:
      - 'master'

jobs:
  build_site:
    # Only run this if the repository isn't the template repository itself
    if: ${{ github.repository != 'datf/copier-svelte-test' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run prettier check
        run: pnpm run check

      - name: Run Tests
        run: pnpm run test:run

      - name: Build site
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: pnpm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest

    # Run only if it's NOT the template repo AND GitHub Pages is enabled
    if: ${{ github.repository != 'datf/copier-svelte-test' && github.event.repository.has_pages == true }}

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
