name: CI (Build & Test)

on:
  pull_request:
    branches:
      - 'master'
      - 'main'

permissions:
  contents: read

jobs:
  build_and_test:
    # Only run this if the repository isn't the template repository itself
    if: ${{ github.repository != 'datf/copier-svelte-test' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run prettier check
        run: pnpm run check

      - name: Run Tests
        run: pnpm run test:run

      - name: Build site
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: pnpm run build
